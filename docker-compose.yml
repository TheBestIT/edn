services:
  edn:
    build: .
    ports:
      - 8000:8000
    env_file:
      - ./.env
    environment:
      DOCKERIZED: 1
    depends_on:
      mongodb:
        condition: service_started
      redis:
        condition: service_healthy
  
  mongodb:
    image: mongo
    restart: always
    ports:
    - 27017:27017
    env_file:
      - ./.env
  
  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    env_file:
      - ./.env
  
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - 6379:6379
    volumes:
      - redis-data:/data
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  redis-data:
    driver: local
